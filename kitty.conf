# vim:fileencoding=utf-8:foldmethod=marker

# -- Font ---------------------------------------------------------------
font_size 12.0

# -- General -------------------------------------------------------------
macos_option_as_alt yes
confirm_os_window_close 2
scrollback_lines 10000
copy_on_select clipboard

# -- Window Layout ------------------------------------------------------
enabled_layouts splits,stack
remember_window_position yes
remember_window_size yes
window_border_width 2px
window_padding_width 4
active_border_color              #555555
inactive_border_color            #444444
window_title_bar top
window_title_bar_min_windows 2
window_title_bar_align left
window_title_bar_inactive_foreground #999999
window_title_bar_inactive_background #1a1a1a
window_title_template " {title}"

# -- Tab Bar ------------------------------------------------------------
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        2
tab_bar_margin_height   4 0
tab_title_template      " {index}: {title} "
active_tab_font_style   bold
inactive_tab_font_style normal

# -- Kitty Windows (Navigate) ------------------------------------------
# Move focus between kitty windows (cmd+hjkl)
map cmd+h neighboring_window left
map cmd+j neighboring_window down
map cmd+k neighboring_window up
map cmd+l neighboring_window right

# -- Kitty Windows (Create) --------------------------------------------
# Split and create new kitty window in that direction (cmd+shift+hjkl)
map cmd+shift+h combine : launch --location=vsplit --cwd=current : move_window left
map cmd+shift+j launch --location=hsplit --cwd=current
map cmd+shift+k combine : launch --location=hsplit --cwd=current : move_window up
map cmd+shift+l launch --location=vsplit --cwd=current

# -- Kitty Windows (Move) ----------------------------------------------
# Swap kitty window position (cmd+option+hjkl)
map cmd+alt+h move_window left
map cmd+alt+j move_window down
map cmd+alt+k move_window up
map cmd+alt+l move_window right

# -- Kitty Windows (Resize) --------------------------------------------
map cmd+ctrl+l resize_window wider 3
map cmd+ctrl+h resize_window narrower 3
map cmd+ctrl+k resize_window taller 3
map cmd+ctrl+j resize_window shorter 3
map cmd+ctrl+0 resize_window reset

# -- Kitty Windows (Close / Zoom) --------------------------------------
# Close the active kitty window (not the tab)
map cmd+w close_window
# Toggle stack layout (zoom/unzoom a pane)
map cmd+z toggle_layout stack

# -- Titles -------------------------------------------------------------
# Set tab title ("name")
map cmd+n set_tab_title " "
# Set kitty window title ("name")
map cmd+shift+n set_window_title " "
